name: Update AIwork Data Daily

# 目标: 每天北京时间早上 7:00 自动运行一次,也可手动触发。
# cron 时区为 UTC, 所以 7:00 北京时间 = 23:00 UTC (前一天)。
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  # 允许 actions 读取仓库内容
  contents: write
  # 允许 push 后触发 GitHub Pages 构建
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 拉取完整历史,以便 commit & push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git (for bot commits)
        run: |
          git config user.name "AIwork Bot"
          git config user.email "aiwork-bot@users.noreply.github.com"

      - name: Run update script (fetch AI news + update JSON)
        run: python update_aiwork.py

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain data/tools.json data/tokens.json)" ]]; then
            git add data/tools.json data/tokens.json
            git commit -m "自动更新: $(date -u +%Y-%m-%d) AI工具和Token信息"
            # 优先推送到 main,如失败则回退 master
            git push origin HEAD:main || git push origin HEAD:master
          else
            echo "No changes detected; skipping commit & push."
          fi
