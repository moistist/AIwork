name: Update AIwork Data Daily

on:
  schedule:
    # 每天北京时间07:00自动执行 (23:00 UTC)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 需要写入权限才能推送

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python update_aiwork.py

      - name: Configure Git
        run: |
          git config user.name "AIwork Bot"
          git config user.email "aiwork@example.com"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add data/tools.json data/tokens.json
          git commit -m "自动更新: $(date +'%Y-%m-%d') AI工具和Token信息" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
