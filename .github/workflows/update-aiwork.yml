name: Update AIwork Data Daily

on:
  schedule:
    - cron: '0 23 * * *'  # Runs at 23:00 UTC (which is 07:00 UTC+8/Beijing time)
  workflow_dispatch:  # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Allow git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python update_aiwork.py

      - name: Configure Git
        run: |
          git config user.name "AIwork Bot"
          git config user.email "aiwork@example.com"

      - name: Commit and push changes
        run: |
          git add data/tools.json data/tokens.json data/news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新: $(date +'%Y-%m-%d') AI工具、Token和新闻" && git push)
