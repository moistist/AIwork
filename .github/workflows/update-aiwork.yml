name: Update AIwork Data Daily

# 每天北京时间 07:00 自动执行（= UTC 前一天 23:00），也支持手动触发
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write    # 允许 bot 回写 commits
  pages: write       # 允许触发 GitHub Pages 部署
  id-token: write    # Pages 部署所需

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 拉取完整历史以便推送
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data update script
        run: python update_aiwork.py

      - name: Configure Git (AIwork Bot)
        run: |
          git config user.name "AIwork Bot"
          git config user.email "aiwork-bot@users.noreply.github.com"

      - name: Commit & push data changes
        run: |
          git add data/tools.json data/tokens.json
          if git diff --cached --quiet; then
            echo "没有数据变更，跳过提交。"
          else
            git commit -m "自动更新: $(date +'%Y-%m-%d') AI工具和Token信息"
            # 推送到当前检出的分支（兼容 main / master）
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin "$BRANCH"
            echo "已推送变更到 $BRANCH"
          fi

      # ------------- GitHub Pages 部署 -------------
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          # 仓库根目录就是一个静态站点（index.html / css / js / data）
          path: '.'

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
