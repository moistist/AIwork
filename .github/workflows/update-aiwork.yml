name: Update AIwork Data Daily

on:
  schedule:
    # 每天 07:00 北京时间 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main  # 当main分支有推送时也运行（可选）

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run update script
        run: python update_aiwork.py
        env:
          WORK_DIR: ${{ github.workspace }}

      - name: Configure Git
        run: |
          git config user.name "AIwork Bot"
          git config user.email "aiwork[bot]@users.noreply.github.com"
          git config --global --add safe.directory ${{ github.workspace }}

      - name: Commit and push changes
        id: commit
        run: |
          git add data/tools.json data/tokens.json
          
          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M:%S') AI工具和Token信息"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
            echo "commit_push=success" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show result
        run: |
          if [ "${{ steps.commit.outputs.commit_push }}" == "success" ]; then
            echo "✅ 数据已更新并推送到 GitHub"
          else
            echo "ℹ️ 没有新数据需要更新"
          fi
