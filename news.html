<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI新闻 - AIwork</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .news-page {
      padding-top: 64px;
      min-height: 100vh;
    }

    .news-header {
      padding: 60px 0 40px;
      text-align: center;
    }

    .news-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--color-gold), var(--color-gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .news-header p {
      color: var(--color-text-muted);
      font-size: 1.1rem;
    }

    .news-list-section {
      padding-bottom: 80px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .news-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }

    .news-card:hover {
      border-color: var(--color-gold);
      box-shadow: 0 0 24px rgba(212, 168, 67, 0.2), 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: translateY(-6px);
    }

    .news-card-content {
      padding: 28px;
    }

    .news-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .news-source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(212, 168, 67, 0.12);
      color: var(--color-gold);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .news-date {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .news-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .news-summary {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .news-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .news-tag {
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      font-size: 0.8rem;
    }

    .news-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-gold);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 16px;
      text-decoration: none;
    }

    .news-link:hover {
      color: var(--color-gold-light);
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--color-text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--color-text);
    }

    @media (max-width: 768px) {
      .news-header h1 {
        font-size: 2rem;
      }

      .news-header p {
        font-size: 1rem;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .news-card-content {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .news-header h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="./index.html" class="navbar-brand">AIwork</a>
      <button class="navbar-toggle" aria-label="切换导航">☰</button>
      <ul class="navbar-nav">
        <li><a href="./index.html">首页</a></li>
        <li><a href="./tools.html">工具</a></li>
        <li><a href="./tokens.html">Token</a></li>
        <li><a href="./news.html">新闻</a></li>
        <li><a href="./about.html">关于</a></li>
      </ul>
    </div>
  </nav>

  <main class="news-page">
    <div class="container">
      <div class="news-header">
        <h1>AI新闻</h1>
        <p>获取最新AI行业动态与技术资讯</p>
      </div>

      <div class="news-list-section">
        <div class="news-grid" id="newsGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-state-icon">📰</div>
          <h3>暂无新闻</h3>
          <p>新闻正在更新中，敬请期待</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-brand">AIwork</div>
      <ul class="footer-links">
        <li><a href="./index.html">首页</a></li>
        <li><a href="./tools.html">工具</a></li>
        <li><a href="./tokens.html">Token</a></li>
        <li><a href="./news.html">新闻</a></li>
        <li><a href="./about.html">关于</a></li>
      </ul>
      <p class="footer-copy">&copy; 2026 AIwork. 保留所有权利。</p>
    </div>
  </footer>

  <script src="./js/main.js"></script>
  <script src="./js/news.js"></script>
</body>
</html>
